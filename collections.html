<!DOCTYPE html>

<html>
<head>
<title>VEILORA Collections</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial,sans-serif;
background:#f8f4ec;
margin:0;
}

header{
background:#111;
padding:20px;
text-align:center;
}

header img{
max-width:250px;
}

h1{
text-align:center;
color:#c8a96b;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
text-align:center;
}

.price{
font-size:20px;
font-weight:bold;
color:#c8a96b;
}

button{
background:#111;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
}
</style>

</head>

<body>

<header>
<img src="logo.png">
</header>

<h1>Our Collection</h1>

<div class="products">

<div class="card">
<h3>Premium Chiffon Hijab</h3>
<div class="price">₹250</div>
<button>Buy Now</button>
</div>

<div class="card">
<h3>Luxury Jersey Hijab</h3>
<div class="price">₹350</div>
<button>Buy Now</button>
</div>

<div class="card">
<h3>Signature Collection</h3>
<div class="price">₹700</div>
<button>Buy Now</button>
</div>

<div class="card">
<h3>Hijab Magnet Set</h3>
<div class="price">₹99</div>
<button>Buy Now</button>
</div>

</div>

</body>
</html>
