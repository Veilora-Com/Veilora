```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VEILORA Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f8f4ec;
}

header{
background:#111;
padding:20px;
text-align:center;
}

header img{
max-width:350px;
width:90%;
}

.container{
max-width:650px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#c8a96b;
margin-bottom:25px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, textarea{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
}

.payment-box{
background:#f7f7f7;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.payment-box h3{
color:#c8a96b;
margin-bottom:10px;
}

.btn{
width:100%;
padding:15px;
margin-top:25px;
background:#c8a96b;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.note{
margin-top:15px;
text-align:center;
color:#666;
font-size:14px;
}

footer{
text-align:center;
padding:20px;
color:#777;
}

</style>
</head>

<body>

<header>
<img src="logo.png" alt="VEILORA">
</header>

<div class="container">

<h1>Checkout</h1>

<label>Full Name</label>
<input
type="text"
id="name"
placeholder="Enter your full name"
required>

<label>Mobile Number</label>
<input
type="tel"
id="phone"
maxlength="10"
placeholder="Enter 10 digit mobile number"
required>

<label>Delivery Address</label>
<textarea
id="address"
rows="4"
placeholder="Enter complete delivery address"
required></textarea>

<div class="payment-box">

<h3>Payment Method</h3>

<p>✓ Cash On Delivery Available</p>

<br>

<p style="color:#888;">
Online Payment (Coming Soon)
</p>

</div>

<button class="btn" onclick="placeOrder()">
Place Order
</button>

<p class="note">
By placing an order, you agree to our delivery terms.
</p>

</div>

<footer>
VEILORA • Elegance in Every Veil
</footer>

<script>

function placeOrder(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let address=document.getElementById("address").value.trim();

if(name==""){
alert("Please enter your name");
return;
}

if(phone.length!=10 || isNaN(phone)){
alert("Please enter a valid 10 digit mobile number");
return;
}

if(address==""){
alert("Please enter your address");
return;
}

alert("Order Placed Successfully!");

window.location.href="order-success.html";

}

</script>

</body>
</html>
```
