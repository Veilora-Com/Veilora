<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEILORA Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#f8f3ea,#e8dcc7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:#fff;
width:380px;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

.logo{
font-size:36px;
font-weight:bold;
color:#b08d57;
margin-bottom:10px;
}

.tagline{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#b08d57;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#9b7847;
}

#otpSection{
display:none;
margin-top:15px;
}

#recaptcha-container{
margin-top:15px;
display:flex;
justify-content:center;
}

.note{
margin-top:15px;
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">VEILORA</div>

<div class="tagline">
Elegance In Every Veil
</div>

<div id="phoneSection">

<input
type="tel"
id="phone"
placeholder="Enter 10 Digit Mobile Number"
maxlength="10">

<button onclick="sendOTP()">
Send OTP
</button>

<div id="recaptcha-container"></div>

</div>

<div id="otpSection">

<input
type="text"
id="otp"
placeholder="Enter OTP">

<button onclick="verifyOTP()">
Verify OTP
</button>

</div>

<div class="note">
Secure OTP Login Powered By Firebase
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";

import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
}
from "https://www.gstatic.com/firebasejs/12.5.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDp9kimqvO3MnA7K0kv8rX_SE8MKv8RHm8",

authDomain: "veilora-hijabs.firebaseapp.com",

projectId: "veilora-hijabs",

storageBucket: "veilora-hijabs.firebasestorage.app",

messagingSenderId: "583937143293",

appId: "1:583937143293:web:384e96af2ce84d768d2994",

measurementId: "G-JEHVTD2M7L"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.recaptchaVerifier =
new RecaptchaVerifier(
auth,
"recaptcha-container",
{
size:"normal"
}
);

window.sendOTP = function(){

let phone =
document.getElementById("phone").value;

if(phone.length !== 10){

alert("Enter Valid 10 Digit Number");

return;

}

const appVerifier =
window.recaptchaVerifier;

const fullPhone =
"+91" + phone;

signInWithPhoneNumber(
auth,
fullPhone,
appVerifier
)

.then((confirmationResult)=>{

window.confirmationResult =
confirmationResult;

document.getElementById(
"otpSection"
).style.display="block";

alert("OTP Sent Successfully");

})

.catch((error)=>{

alert(error.message);

});

}

window.verifyOTP = function(){

let code =
document.getElementById("otp").value;

confirmationResult.confirm(code)

.then((result)=>{

localStorage.setItem(
"veiloraUser",
result.user.phoneNumber
);

localStorage.setItem(
"isLoggedIn",
"true"
);

alert("Login Successful");

window.location.href =
"collections.html";

})

.catch((error)=>{

alert("Invalid OTP");

});

}

</script>

</body>
</html>
