<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEILORA Login</title>

<style>
body{
font-family:Segoe UI,sans-serif;
background:#f8f3ed;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:35px;
width:360px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
text-align:center;
}

h1{
color:#b08d57;
margin-bottom:5px;
}

p{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#b08d57;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="box">

<h1>VEILORA</h1>

<p>Elegance In Every Veil</p>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="tel"
id="phone"
placeholder="10 Digit Mobile Number"
maxlength="10">

<button onclick="login()">
Continue Shopping
</button>

</div>

<script>

function login(){

let name =
document.getElementById("name").value;

let phone =
document.getElementById("phone").value;

if(name==""){

alert("Enter Name");

return;

}

if(phone.length!=10){

alert("Enter Valid Mobile Number");

return;

}

localStorage.setItem(
"veiloraName",
name
);

localStorage.setItem(
"veiloraPhone",
phone
);

localStorage.setItem(
"isLoggedIn",
"true"
);

window.location.href=
"collections.html";

}

</script>

</body>
</html>
